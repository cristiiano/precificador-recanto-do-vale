<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 Precificador - Recanto do Vale</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh}
        .container{max-width:1000px;margin:0 auto;padding:20px}
        .header{text-align:center;padding:30px;background:rgba(255,255,255,0.05);border-radius:20px;margin-bottom:30px}
        .header h1{font-size:2em;margin-bottom:10px}
        .location{color:#4CAF50;font-weight:bold}
        .card{background:rgba(255,255,255,0.08);border-radius:15px;padding:25px;margin-bottom:20px}
        .card h2{color:#4CAF50;margin-bottom:20px}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
        .field{margin-bottom:10px}
        .field label{display:block;color:#ccc;margin-bottom:5px;font-size:.9em}
        .field input,.field select{width:100%;padding:10px;border:1px solid rgba(255,255,255,0.2);border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;font-size:1em}
        .field select option{background:#1a1a2e}
        .btn{display:block;width:100%;padding:15px;background:#4CAF50;color:#fff;border:none;border-radius:8px;font-size:1.1em;cursor:pointer;font-weight:bold;margin-top:15px}
        .btn:hover{background:#45a049}
        .loading{display:none;text-align:center;padding:20px;color:#4CAF50}
        .loading.show{display:block}
        table{width:100%;border-collapse:collapse;margin-top:15px;font-size:.85em}
        th{background:rgba(76,175,80,0.2);padding:10px;text-align:left;color:#4CAF50}
        td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.05)}
        tr:hover{background:rgba(255,255,255,0.05)}
        .link{color:#4CAF50;text-decoration:none}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
        .stat{background:rgba(255,255,255,0.05);padding:12px;border-radius:8px;text-align:center}
        .stat .val{font-size:1.3em;font-weight:bold;color:#4CAF50}
        .stat .lbl{color:#aaa;font-size:.75em;margin-top:3px}
        .tipo-casa{color:#4CAF50}.tipo-terreno{color:#FF9800}
        .erro{background:rgba(244,67,54,0.2);padding:15px;border-radius:10px;color:#f44336;margin-top:10px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Precificador de Imóveis</h1>
            <p>📍 <span class="location">Recanto do Vale - Sapucaia do Sul/RS</span></p>
            <p style="color:#aaa;font-size:.9em">🏢 Besser | Corretor e Cia | Sauthier</p>
            <p style="color:#666;font-size:.75em;margin-top:10px">⚡ Rodando Python no navegador (sem servidor)</p>
        </div>
        
        <div class="card">
            <h2>🔍 Filtros</h2>
            <div class="grid">
                <div class="field">
                    <label>🏢 Imobiliária</label>
                    <select id="imob">
                        <option value="todas">TODAS</option>
                        <option value="besser">Besser</option>
                        <option value="corretorcia">Corretor e Cia</option>
                        <option value="sauthier">Sauthier</option>
                    </select>
                </div>
                <div class="field">
                    <label>🏷️ Tipo</label>
                    <select id="tipo">
                        <option value="">Todos</option>
                        <option value="Casa">Casas</option>
                        <option value="Terreno">Terrenos</option>
                    </select>
                </div>
                <div class="field">
                    <label>💰 Preço Mín (R$)</label>
                    <input type="number" id="pmin" placeholder="100000">
                </div>
                <div class="field">
                    <label>💰 Preço Máx (R$)</label>
                    <input type="number" id="pmax" placeholder="600000">
                </div>
                <div class="field">
                    <label>📐 Área Mín (m²)</label>
                    <input type="number" id="amin" placeholder="50">
                </div>
                <div class="field">
                    <label>📐 Área Máx (m²)</label>
                    <input type="number" id="amax" placeholder="300">
                </div>
            </div>
            <button class="btn" onclick="buscarImoveis()">🔍 Buscar Imóveis</button>
        </div>
        
        <div class="loading" id="loading">
            <p>⏳ Carregando Python... (primeira vez pode demorar)</p>
            <p style="color:#aaa;font-size:.8em">As próximas buscas serão mais rápidas!</p>
        </div>
        
        <div id="resultados"></div>
        <div id="erro" class="erro" style="display:none"></div>
    </div>

    <script>
        let pyodideReady = false;
        let pyodide;
        
        // Inicializar Pyodide
        async function initPyodide() {
            if (pyodideReady) return;
            
            document.getElementById('loading').classList.add('show');
            document.getElementById('loading').innerHTML = '<p>⏳ Carregando Python... (≈30 segundos na primeira vez)</p>';
            
            try {
                pyodide = await loadPyodide();
                await pyodide.loadPackage(['micropip']);
                const micropip = pyodide.pyimport('micropip');
                await micropip.install(['requests', 'beautifulsoup4']);
                
                // Código Python do precificador
                await pyodide.runPythonAsync(`
import requests
from bs4 import BeautifulSoup
import re
import json

class Precificador:
    def __init__(self):
        self.imobiliarias = {
            'besser': {
                'nome': 'Besser Negócios Imobiliários',
                'url': 'https://www.imobiliariabesser.com.br/imoveis/sapucaia-do-sul/recanto-do-vale',
                'url_base': 'https://www.imobiliariabesser.com.br',
                'telefone': '(51) 3459-2222',
                'cor': '#2196F3'
            },
            'corretorcia': {
                'nome': 'Corretor e Cia',
                'url': 'https://www.corretorecia.com/imobiliaria/venda/casa/recanto-do-vale/sapucaia-do-sul-rs/imoveis/',
                'url_base': 'https://www.corretorecia.com',
                'telefone': '(51) 3474-1212',
                'cor': '#9C27B0'
            },
            'sauthier': {
                'nome': 'Sauthier Imóveis',
                'url': 'https://www.sauthier.com.br/Imovel/Venda/Casa/Vargas/Sapucaia-Do-Sul/RS/',
                'url_base': 'https://www.sauthier.com.br',
                'telefone': '(51) 3474-1111',
                'cor': '#FF5722'
            }
        }
        self.resultados = []
    
    def buscar_site(self, config, tipo=None, preco_min=0, preco_max=999999999, area_min=0, area_max=999999):
        headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
        imoveis = []
        
        try:
            response = requests.get(config['url'], headers=headers, timeout=15)
            if response.status_code != 200:
                return []
            
            soup = BeautifulSoup(response.content, 'html.parser')
            links = soup.find_all('a', href=re.compile(r'/imovel|/Imovel', re.I))
            texto_completo = soup.get_text()
            precos_texto = re.findall(r'R\\$\\s*[\\d.,]+', texto_completo)
            areas_texto = re.findall(r'(\\d+[\\.,]?\\d*)\\s*m²', texto_completo)
            
            if links:
                for link in links:
                    try:
                        href = link.get('href', '')
                        texto = link.get_text(strip=True)
                        if len(texto) < 10:
                            pai = link.find_parent(['div', 'article', 'li'])
                            if pai:
                                texto = pai.get_text(strip=True)
                        
                        tipo_imovel = 'Terreno' if 'terreno' in href.lower() + texto.lower() else 'Casa'
                        if tipo and tipo.lower() not in tipo_imovel.lower():
                            continue
                        
                        area = 0
                        m = re.search(r'(\\d+[\\.,]?\\d*)\\s*m²', texto)
                        if m: area = float(m.group(1).replace(',', '.'))
                        
                        preco = 0
                        m = re.search(r'R\\$\\s*([\\d.]+(?:,\\d{2})?)', texto)
                        if m: preco = float(m.group(1).replace('.', '').replace(',', '.'))
                        
                        if 'aluguel' in texto.lower() and 'venda' not in texto.lower():
                            continue
                        if preco > 0 and (preco < preco_min or preco > preco_max):
                            continue
                        if area > 0 and (area < area_min or area > area_max):
                            continue
                        
                        link_completo = config['url_base'] + href if href.startswith('/') else href
                        preco_m2 = round(preco/area, 2) if preco > 0 and area > 0 else 0
                        
                        imoveis.append({
                            'codigo': '', 'titulo': texto[:150], 'tipo': tipo_imovel,
                            'preco': preco, 'area': area, 'preco_m2': preco_m2,
                            'link': link_completo, 'imobiliaria': config['nome'],
                            'telefone': config['telefone'], 'cor': config['cor']
                        })
                    except: continue
            
            if not imoveis and precos_texto and areas_texto:
                for i in range(min(len(precos_texto), len(areas_texto))):
                    try:
                        preco = float(re.sub(r'[^\\d]', '', precos_texto[i]))
                        area = float(areas_texto[i].replace(',', '.'))
                        if area > 0 and preco > 0:
                            imoveis.append({
                                'codigo': '', 'titulo': f'Imóvel {i+1}', 'tipo': tipo or 'Casa/Terreno',
                                'preco': preco, 'area': area, 'preco_m2': round(preco/area, 2),
                                'link': config['url'], 'imobiliaria': config['nome'],
                                'telefone': config['telefone'], 'cor': config['cor']
                            })
                    except: continue
            
            return imoveis
        except: return []
    
    def buscar(self, imob='todas', tipo=None, pmin=0, pmax=999999999, amin=0, amax=999999):
        todos = []
        for key, cfg in self.imobiliarias.items():
            if imob == 'todas' or imob == key:
                todos.extend(self.buscar_site(cfg, tipo, pmin, pmax, amin, amax))
        
        links_vistos = set()
        unicos = []
        for i in todos:
            if i['link'] not in links_vistos:
                links_vistos.add(i['link'])
                unicos.append(i)
        
        self.resultados = sorted(unicos, key=lambda x: x['preco_m2'] if x['preco_m2'] > 0 else 999999)
        
        # Análise
        validos = [i for i in self.resultados if i['preco_m2'] > 0]
        analise = None
        if validos:
            precos = sorted([i['preco_m2'] for i in validos])
            n = len(precos)
            mediana = precos[n//2] if n%2 else (precos[n//2-1]+precos[n//2])/2
            
            por_imob = {}
            for i in validos:
                imob_nome = i['imobiliaria']
                if imob_nome not in por_imob:
                    por_imob[imob_nome] = {'total':0, 'precos':[], 'cor':i['cor']}
                por_imob[imob_nome]['total'] += 1
                por_imob[imob_nome]['precos'].append(i['preco_m2'])
            
            resumo = {}
            for imob_nome, dados in por_imob.items():
                if dados['precos']:
                    p = sorted(dados['precos'])
                    np_p = len(p)
                    resumo[imob_nome] = {
                        'total': dados['total'],
                        'media': round(sum(p)/np_p, 2),
                        'mediana': round(p[np_p//2], 2) if np_p%2 else round((p[np_p//2-1]+p[np_p//2])/2, 2),
                        'cor': dados['cor']
                    }
            
            analise = {
                'total': len(validos),
                'media': round(sum(precos)/n, 2),
                'mediana': round(mediana, 2),
                'minimo': round(min(precos), 2),
                'maximo': round(max(precos), 2),
                'q1': round(precos[n//4] if n>=4 else precos[0], 2),
                'q3': round(precos[3*n//4] if n>=4 else precos[-1], 2),
                'por_imobiliaria': resumo
            }
        
        return json.dumps({'imoveis': self.resultados, 'analise': analise}, ensure_ascii=False)

precificador = Precificador()
                ''');
                
                pyodideReady = true;
                document.getElementById('loading').innerHTML = '<p>✅ Python carregado! Clique em Buscar.</p>';
                setTimeout(() => document.getElementById('loading').classList.remove('show'), 2000);
                
            } catch (e) {
                document.getElementById('erro').style.display = 'block';
                document.getElementById('erro').textContent = 'Erro ao carregar Python: ' + e.message;
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        async function buscarImoveis() {
            await initPyodide();
            if (!pyodideReady) return;
            
            document.getElementById('loading').classList.add('show');
            document.getElementById('loading').innerHTML = '<p>🔍 Buscando imóveis nas imobiliárias...</p>';
            
            try {
                const imob = document.getElementById('imob').value;
                const tipo = document.getElementById('tipo').value;
                const pmin = document.getElementById('pmin').value || 0;
                const pmax = document.getElementById('pmax').value || 999999999;
                const amin = document.getElementById('amin').value || 0;
                const amax = document.getElementById('amax').value || 999999;
                
                const result = await pyodide.runPythonAsync(`
                    precificador.buscar('${imob}', '${tipo}' or None, ${pmin}, ${pmax}, ${amin}, ${amax})
                `);
                
                const data = JSON.parse(result);
                mostrarResultados(data);
                
            } catch (e) {
                document.getElementById('erro').style.display = 'block';
                document.getElementById('erro').textContent = 'Erro na busca: ' + e.message;
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }
        
        function mostrarResultados(data) {
            const div = document.getElementById('resultados');
            if (!data.analise || data.analise.total === 0) {
                div.innerHTML = '<div class="card"><p>❌ Nenhum imóvel encontrado.</p></div>';
                return;
            }
            
            const a = data.analise;
            let h = '<div class="card"><h2>📊 Análise</h2><div class="stats">';
            h += `<div class="stat"><div class="val">${a.total}</div><div class="lbl">Total</div></div>`;
            h += `<div class="stat"><div class="val">R$ ${a.mediana.toLocaleString('pt-BR')}</div><div class="lbl">⭐ Mediana/m²</div></div>`;
            h += `<div class="stat"><div class="val">R$ ${a.q1.toLocaleString('pt-BR')}</div><div class="lbl">Q1 (25%)</div></div>`;
            h += `<div class="stat"><div class="val">R$ ${a.q3.toLocaleString('pt-BR')}</div><div class="lbl">Q3 (75%)</div></div>`;
            h += '</div>';
            
            if (a.por_imobiliaria) {
                h += '<div class="stats">';
                for (const [imob, dados] of Object.entries(a.por_imobiliaria)) {
                    h += `<div class="stat" style="border-left:3px solid ${dados.cor}">
                        <div class="val" style="color:${dados.cor}">${dados.total}</div>
                        <div class="lbl">${imob}</div>
                        <div class="lbl">Med: R$ ${dados.mediana.toLocaleString('pt-BR')}/m²</div>
                    </div>`;
                }
                h += '</div>';
            }
            
            h += `<div class="card" style="background:rgba(76,175,80,0.1)">
                <p>💡 <strong>Guia:</strong> 50m² = R$ ${(50*a.mediana).toLocaleString('pt-BR')} | 
                100m² = R$ ${(100*a.mediana).toLocaleString('pt-BR')} | 
                150m² = R$ ${(150*a.mediana).toLocaleString('pt-BR')}</p>
            </div></div>`;
            
            h += '<div class="card"><h2>📋 Imóveis</h2><table><thead><tr><th>#</th><th>Tipo</th><th>Imobiliária</th><th>Preço</th><th>Área</th><th>⭐/m²</th><th>Link</th></tr></thead><tbody>';
            
            data.imoveis.forEach((im, i) => {
                h += `<tr>
                    <td>${i+1}</td>
                    <td class="${im.tipo==='Casa'?'tipo-casa':'tipo-terreno'}">${im.tipo}</td>
                    <td style="color:${im.cor}">${im.imobiliaria}</td>
                    <td>${im.preco>0?'R$ '+im.preco.toLocaleString('pt-BR'):'N/D'}</td>
                    <td>${im.area>0?im.area.toFixed(1)+'m²':'N/D'}</td>
                    <td><strong>${im.preco_m2>0?'R$ '+im.preco_m2.toLocaleString('pt-BR'):'N/D'}</strong></td>
                    <td><a href="${im.link}" target="_blank" class="link">🔗 Ver</a></td>
                </tr>`;
            });
            
            h += '</tbody></table></div>';
            div.innerHTML = h;
        }
        
        // Carregar Python automaticamente
        initPyodide();
    </script>
</body>
</html>
